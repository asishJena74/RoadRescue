server:
  port: ${PORT:${SERVER_PORT:5000}}

spring:
  application:
    name: RoadRescue
  flyway:
    enabled: true
    baseline-on-migrate: true

roadrescue:
  client-url: ${CLIENT_URL:http://localhost:5173}
  client-urls: ${CLIENT_URLS:}
  jwt-secret: ${JWT_SECRET:change_me_to_a_long_random_secret}
